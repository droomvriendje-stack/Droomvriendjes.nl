# Frontend (web) service — uses the default Dockerfile (nginx)
[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[build.args]
VITE_API_URL = "https://api.railway.internal:8000"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30

# Backend (api) service — uses Dockerfile.backend
# No startCommand override: the Dockerfile CMD is used directly.
[services.api.build]
builder = "dockerfile"
dockerfilePath = "Dockerfile.backend"

[services.api.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
